name: Build Web App

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
      project_type:
        description: 'Project Type'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist
